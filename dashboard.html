<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - AI Power Optimization</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .grid-dashboard {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 24px;
    }

    .col-span-12 {
      grid-column: span 12;
    }

    .col-span-8 {
      grid-column: span 8;
    }

    .col-span-4 {
      grid-column: span 4;
    }

    .col-span-3 {
      grid-column: span 3;
    }

    .metric-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .metric-value {
      font-size: 2.5rem;
      font-weight: 700;
    }

    .metric-label {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .device-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .device-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    #alerts-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <aside class="sidebar glass-panel"
      style="border-radius: 0; border-top: none; border-bottom: none; border-left: none;">
      <h2>⚡ AI PowerSync</h2>
      <nav class="nav-links">
        <a href="dashboard.html" class="nav-link active">Dashboard</a>
        <a href="analytics.html" class="nav-link">Analytics</a>
        <a href="index.html" class="nav-link" style="margin-top: auto;">Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header fade-in">
        <div>
          <h1 style="font-size: 2rem; margin-bottom: 8px;">Power Dashboard</h1>
          <p style="color: var(--text-muted);" id="current-time">Loading time...</p>
        </div>
        <div class="live-badge">
          <div class="live-dot"></div>
          Live Data (Simulated)
        </div>
      </header>

      <div id="alerts-container"></div>

      <div class="grid-dashboard fade-in" style="animation-delay: 0.1s;">
        <!-- Metrics Row -->
        <div class="col-span-3">
          <div class="glass-panel metric-card">
            <span class="metric-label">Total Power Usage</span>
            <span class="metric-value" id="total-power">0 W</span>
            <span style="color: var(--success); font-size: 0.875rem;" id="power-status">Normal Load</span>
          </div>
        </div>
        <div class="col-span-3">
          <div class="glass-panel metric-card">
            <span class="metric-label">Active Devices</span>
            <span class="metric-value" id="active-devices-count">0</span>
          </div>
        </div>
        <div class="col-span-3">
          <div class="glass-panel metric-card">
            <span class="metric-label">AI Est. Monthly Bill</span>
            <span class="metric-value" id="monthly-bill" style="color: var(--secondary)">₹ 0</span>
            <span style="color: var(--text-muted); font-size: 0.75rem; margin-top: 4px;">Based on DL Prediction (₹8/kWh)</span>
          </div>
        </div>
        <div class="col-span-3">
          <div class="glass-panel metric-card">
            <span class="metric-label">AI Efficiency Score</span>
            <span class="metric-value" id="efficiency-score">100/100</span>
            <div
              style="width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 8px; overflow: hidden;">
              <div id="efficiency-bar"
                style="height: 100%; width: 100%; background: var(--success); transition: width 0.5s ease;"></div>
            </div>
          </div>
        </div>

        <!-- Add Device Form -->
        <div class="col-span-4">
          <div class="glass-panel" style="padding: 24px;">
            <h3 style="margin-bottom: 20px;">Add New Device Data</h3>
            <form id="add-device-form" style="display: flex; flex-direction: column; gap: 16px;">
              <div>
                <label style="display: block; margin-bottom: 8px; font-size: 0.875rem; color: var(--text-muted);">Device
                  Name</label>
                <input type="text" id="device-name" required placeholder="e.g. Air Conditioner">
              </div>
              <div>
                <label style="display: block; margin-bottom: 8px; font-size: 0.875rem; color: var(--text-muted);">Power
                  (Watts)</label>
                <input type="number" id="device-power" required min="1" placeholder="e.g. 1500">
              </div>
              <div>
                <label style="display: block; margin-bottom: 8px; font-size: 0.875rem; color: var(--text-muted);">Usage
                  Time (Hours/Day)</label>
                <input type="number" id="device-hours" required min="0.1" step="0.1" placeholder="e.g. 4">
              </div>
              <button type="submit" class="btn-primary" style="margin-top: 8px;">Add Simulated Data</button>
            </form>
          </div>
        </div>

        <!-- Dispay Devices list-->
        <div class="col-span-8">
          <div class="glass-panel" style="padding: 24px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
              <h3>Device Wise Usage</h3>
              <button id="clear-data-btn"
                style="background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.875rem;">Clear
                All</button>
            </div>
            <div class="device-list" id="device-list-container">
              <!-- Dynamically populated -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/store.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
